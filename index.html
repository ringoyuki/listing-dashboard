<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出品管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=29">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("v4_FoQtSLS1iANLLK");</script>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="login-icon">🔒</div>
      <h2>PRIVATE ACCESS</h2>
      <input type="password" id="inp-pass" class="pass-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')checkAuth()">
      <button class="btn-login" onclick="checkAuth()">開く</button>
      
      <p id="login-err" class="login-err"></p>
    </div>
  </div>

  <!-- アプリ本体（初期は非表示） -->
  <div id="app-main" style="display:none;">
    <header class="header">
      <div class="header-inner">
        <div class="logo">📦 出品管理</div>
        <div class="hstats">
          <span class="spill"><b id="stat-total">0</b> 件</span>
          <span class="spill seed" id="seed-info"></span>
        </div>
        <button class="btn-logout" onclick="logout()" title="ログアウト" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;margin-right:8px;">🚪 ログアウト</button><button class="btn-log" onclick="showLoginLog()" title="ログイン履歴" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--tx1,#f1f5f9);border-radius:8px;padding:6px 12px;font-size:0.8rem;cursor:pointer;margin-right:8px;">🔒 ログイン履歴</button><button class="btn-csv" onclick="openCsvModal()">📥 CSV更新</button><button onclick="openMarketModal()" style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.35);color:#86efac;border-radius:8px;padding:6px 14px;font-size:0.8rem;cursor:pointer;margin-left:8px;font-weight:600;">📊 相場検索</button>
      </div>
      <div id="csv-updated-bar" style="background:rgba(15,15,19,.7);border-bottom:1px solid rgba(255,255,255,0.06);text-align:left;padding:2px 16px;">
      <span id="csv-updated-at" style="font-size:0.7rem;color:#64748b;"></span>
    </div>
  </header>

    <!-- 検索 -->
    <div class="search-panel">
      <div class="search-row">
        <div class="sinput-wrap">
          <label>管理番号</label>
          <input id="inp-code" type="text" class="sinput" placeholder="D790　B1016　C124…"
                 onkeydown="if(event.key==='Enter')doSearch()">
        </div>
        <div class="sor">または</div>
        <div class="sinput-wrap">
          <label>商品名</label>
          <input id="inp-title" type="text" class="sinput" placeholder="セイコー　バカラ　ウェッジウッド…"
                 onkeydown="if(event.key==='Enter')doSearch()">
        </div>
        <button class="btn-search" onclick="doSearch()">🔍&nbsp;検索</button>
      </div>
      <p class="shint">管理番号は上4文字でもOK　　どちらか一方だけでも検索できます</p>
    </div>

    <!-- 結果 -->
    <main id="results" class="results">
      <div class="welcome">
        <div class="welcome-icon">🔍</div>
        <p>管理番号か商品名を入力して「検索」を押してください</p>
      </div>
    </main>
  </div>

  <!-- CSV更新モーダル -->
  <div class="backdrop" id="csv-modal" onclick="if(event.target.id==='csv-modal')closeCsvModal()">
    <div class="modal">
      <div class="mhead">
        <div>
          <h2>📥 ShopsCSV で更新</h2>
          <p class="msub">公開・非公開どちらのCSVも取り込めます</p>
        </div>
        <button class="mclose" onclick="closeCsvModal()">✕</button>
      </div>
      <div class="mbody">
        <div class="dropzone" onclick="document.getElementById('csvfile').click()">
          <div class="dz-icon">📂</div>
          <p class="dz-text">クリックしてCSVを選択</p>
          <p class="dz-hint">Shops管理 → 商品管理 → CSV一括機能 → CSVダウンロード（公開・非公開それぞれ）</p>
          <input type="file" id="csvfile" accept=".csv" style="display:none">
        </div>
        <div id="prev-area"></div>
        <div class="mfooter">
          <button class="btn-sec" onclick="closeCsvModal()">キャンセル</button>
          <button class="btn-ok" id="btn-import" style="display:none" onclick="runImport()">インポート実行</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 更新バナー -->
  <div id="upd-banner" class="upd-banner" style="display:none">
    <span id="upd-msg"></span>
    <button class="btn-ok btn-sm" onclick="applyNewSeed()">Shopsデータで更新</button>
    <button class="btn-sec btn-sm" onclick="dismissBanner()">あとで</button>
  </div>

  <div class="toast" id="toast"></div>
  <!-- ログイン履歴モーダル -->
  <div class="backdrop" id="login-log-modal" onclick="if(event.target.id==='login-log-modal')closeLoginLog()">
    <div class="modal" style="max-width:520px;">
      <div class="mhead">
        <div><h2>🔒 ログイン履歴</h2><p class="msub">最新30件のログインを記録しています</p></div>
        <button class="mclose" onclick="closeLoginLog()">×</button>
      </div>
      <div class="mbody" style="padding:0;">
        <div id="login-log-body" style="max-height:400px;overflow-y:auto;"></div>
      </div>
    </div>
  </div>
  <!-- 相場検索パネル -->
  <div class="backdrop" id="market-modal" onclick="if(event.target.id==='market-modal')closeMarketModal()" style="align-items:flex-start;padding-top:0;">
    <div class="modal" style="max-width:98vw;width:1100px;margin:0 auto;height:100vh;border-radius:0;display:flex;flex-direction:column;">
      <div class="mhead" style="flex-shrink:0;">
        <div>
          <h2>📊 出品してX日更新なし</h2>
          <p class="msub">取り込み済みの商品データから、更新なしの商品を抽出します</p>
        </div>
        <button class="mclose" onclick="closeMarketModal()">✕</button>
      </div>
      <div class="mbody" style="flex:1;overflow:hidden;display:flex;flex-direction:column;padding:12px 16px;">
        <!-- 操作バー -->
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;flex-shrink:0;">
          <label style="font-size:0.85rem;color:#94a3b8;">出品から</label>
          <input type="number" id="market-days" value="0" min="0" max="9999"
            style="width:72px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#f1f5f9;border-radius:6px;padding:5px 8px;font-size:0.9rem;text-align:center;">
          <label style="font-size:0.85rem;color:#94a3b8;">日以上</label>
          <button onclick="runMarketSearch()" style="background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.45);color:#86efac;border-radius:8px;padding:6px 18px;font-size:0.85rem;cursor:pointer;font-weight:600;">🔍 検索</button>
          <!-- ソートボタン -->
          <button id="sort-old-btn" onclick="marketSortByDays(false)"
            style="background:rgba(251,191,36,0.25);border:1px solid rgba(251,191,36,0.5);color:#fde68a;border-radius:8px;padding:5px 12px;font-size:0.82rem;cursor:pointer;font-weight:600;">古い順 ↓</button>
          <button id="sort-new-btn" onclick="marketSortByDays(true)"
            style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#94a3b8;border-radius:8px;padding:5px 12px;font-size:0.82rem;cursor:pointer;">新しい順 ↑</button>
          <div id="market-summary" style="font-size:0.82rem;color:#94a3b8;margin-left:4px;"></div>
          <div style="margin-left:auto;display:flex;gap:8px;">
            <button onclick="copyMarketTsv()" id="market-copy-btn" style="display:none;background:rgba(99,102,241,0.18);border:1px solid rgba(99,102,241,0.4);color:#a5b4fc;border-radius:8px;padding:6px 14px;font-size:0.82rem;cursor:pointer;">📋 スプレッドシートにコピー</button>
          </div>
        </div>
        <!-- テーブル -->
        <div id="market-table-wrap" style="flex:1;overflow-y:auto;"></div>
      </div>
    </div>
  </div>

  <script src="seed_data.js"></script>
  <script src="app.js?v=14"></script>
  <script src="market_search.js"></script>
</body>
